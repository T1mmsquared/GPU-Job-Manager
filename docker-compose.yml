services:
  db:
    image: postgres:16
    container_name: gpu_job_manager_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: gpu_job_manager_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gpu_job_manager_api
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      python -m uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
    restart: unless-stopped
    
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gpu_job_manager_worker
    user: "${UID:-1000}:${GID:-1000}"
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A worker.celery_app.celery_app worker
      --loglevel=INFO
    restart: unless-stopped


volumes:
  postgres_data:
